<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>店舗作業タイマー</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
 :root{--bg:#0f1419;--card:#1a2230;--accent:#4a9eff;--ok:#2ecc71;--warn:#f1c40f;--txt:#e6edf3;--mut:#8b98a5;--danger:#e74c3c;}
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
 html,body{height:100%;}
 body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--txt);font-size:16px;display:flex;flex-direction:column;overflow:hidden;}
 #hdr{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#0d1117;border-bottom:1px solid #202938;}
 #hdrTitle{font-weight:bold;font-size:15px;}
 #hdr button{padding:7px 12px;font-size:14px;}
 .screen{flex:1 1 auto;overflow-y:auto;padding:12px;max-width:520px;width:100%;margin:0 auto;padding-bottom:90px;}
 h1{font-size:18px;margin:8px 0;}
 .card{background:var(--card);border-radius:12px;padding:14px;margin:10px 0;}
 .row{display:flex;align-items:center;gap:8px;}
 .row.sb{justify-content:space-between;}
 button{font-family:inherit;font-size:16px;border:none;border-radius:10px;padding:12px 14px;color:#fff;background:#334a5e;cursor:pointer;}
 button:active{filter:brightness(1.25);}
 button:disabled{opacity:.4;}
 .btn-accent{background:var(--accent);} .btn-ok{background:var(--ok);} .btn-warn{background:var(--warn);color:#222;} .btn-ghost{background:#2a3340;}
 .big{font-size:20px;font-weight:bold;padding:18px;width:100%;}
 .wfull{width:100%;}
 input,select{font-family:inherit;font-size:16px;background:#0d1117;border:1px solid #30363d;color:var(--txt);border-radius:8px;padding:8px;width:90px;text-align:center;}
 input.date{width:150px;} input.wide{width:100%;text-align:left;}
 input.kpfield{caret-color:transparent;}
 input.kpfocus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
 .badge{font-size:12px;padding:3px 9px;border-radius:20px;background:#334a5e;color:var(--mut);}
 .badge.done{background:rgba(46,204,113,.2);color:var(--ok);}
 .badge.active{background:rgba(74,158,255,.25);color:var(--accent);}
 .store-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:10px;margin:6px 0;background:#0d1117;cursor:pointer;}
 .store-item:active{background:#162030;}
 .store-item .nm{font-weight:bold;font-size:17px;}
 .step{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:11px 12px;border-radius:10px;margin:6px 0;background:#0d1117;cursor:pointer;}
 .step.cur{background:rgba(74,158,255,.15);border:1px solid var(--accent);}
 .step.done{opacity:.6;}
 .step .nm{flex:1;}
 .step .tm{font-variant-numeric:tabular-nums;font-weight:bold;min-width:60px;text-align:right;}
 .step .edit{background:none;padding:4px 8px;font-size:15px;}
 .timer{font-size:44px;font-weight:bold;text-align:center;font-variant-numeric:tabular-nums;margin:4px 0 2px;}
 .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
 .mut{color:var(--mut);font-size:13px;}
 .qrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;gap:8px;}
 .pu{display:flex;justify-content:space-between;padding:8px 10px;background:#0d1117;border-radius:8px;margin:4px 0;font-size:14px;}
 .pu .v{color:var(--accent);font-weight:bold;font-variant-numeric:tabular-nums;}
 textarea{width:100%;background:#0d1117;border:1px solid #30363d;color:var(--txt);border-radius:8px;padding:8px;font-family:inherit;font-size:15px;}
 .hide{display:none !important;}
 .chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;}
 .chip{padding:8px 13px;border-radius:20px;background:#2a3340;font-size:14px;cursor:pointer;position:relative;}
 .chip.on{background:var(--accent);font-weight:bold;}
 .chip .dot{position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--warn);}
 .todo-row{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #202938;}
 .todo-row span{flex:1;}
 .todo-row .done-txt{text-decoration:line-through;color:var(--mut);}
 .todo-row input[type=checkbox]{width:22px;height:22px;}
 .todo-row .del{background:none;color:var(--danger);padding:4px 8px;}
 .chk{display:flex;align-items:center;gap:12px;padding:14px;background:#0d1117;border-radius:10px;margin:8px 0;font-size:17px;cursor:pointer;}
 .chk input{width:26px;height:26px;}
 .ord{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#0d1117;border-radius:10px;margin:6px 0;}
 .ord .nm{flex:1;font-weight:bold;}
 .ord.skip{opacity:.45;}
 .ord button{padding:7px 11px;font-size:15px;}
 .hbox{background:#0d1117;border-radius:10px;padding:10px;margin:6px 0;white-space:pre-wrap;font-size:14px;border-left:3px solid var(--warn);}
 .drawerbar{position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid #202938;display:flex;gap:5px;padding:8px;justify-content:center;z-index:5;}
 .drawerbar button{flex:1;max-width:96px;padding:9px 4px;font-size:12px;position:relative;background:#2a3340;}
 .drawerbar button .dot{position:absolute;top:2px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--warn);}
 .overlay{position:fixed;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;}
 .overlay .inner{flex:1;overflow-y:auto;padding:12px;max-width:520px;width:100%;margin:0 auto;}
 .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:30;}
 .sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:16px 16px 0 0;z-index:31;max-height:75dvh;display:flex;flex-direction:column;}
 .sheet .sh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #202938;font-weight:bold;}
 .sheet .sc{overflow-y:auto;padding:12px 16px 20px;}
 .keypad{position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid #202938;z-index:40;padding:8px;max-width:520px;margin:0 auto;}
 .keypad .kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
 .keypad button{padding:14px;font-size:20px;font-weight:bold;background:#2a3340;}
 .keypad .kok{background:var(--ok);}
 body.kp-open .screen{padding-bottom:250px;}
 body.kp-open .sheet .sc{padding-bottom:240px;}
 .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#000;padding:11px 18px;border-radius:22px;opacity:0;transition:.3s;pointer-events:none;z-index:50;}
 .toast.show{opacity:.95;}
</style>
</head>
<body>
<div id="hdr">
 <span id="hdrTitle">🕘 店舗作業タイマー</span>
 <div class="row">
  <button class="btn-ghost" id="btnHome" onclick="confirmHome()">🏠</button>
  <button class="btn-ghost" onclick="openList()">📋 一覧</button>
 </div>
</div>

<div id="scrTitle" class="screen hide"></div>
<div id="scrCourse" class="screen hide"></div>
<div id="scrInput" class="screen hide"></div>
<div id="scrPlan" class="screen hide"></div>
<div id="scrLoad" class="screen hide"></div>
<div id="scrOrder" class="screen hide"></div>
<div id="scrCheck" class="screen hide"></div>
<div id="scrStore" class="screen hide"></div>
<div id="scrReturn" class="screen hide"></div>
<div id="scrHandover" class="screen hide"></div>

<div id="listOv" class="overlay hide">
 <div id="hdr2" style="flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#0d1117;border-bottom:1px solid #202938;">
  <b>⑭ 一覧モード</b>
  <button class="btn-ghost" onclick="closeList()">✕ 閉じる</button>
 </div>
 <div class="inner" id="listInner"></div>
</div>

<div id="sheetBg" class="sheet-bg hide" onclick="closeSheet()"></div>
<div id="sheetEl" class="sheet hide">
 <div class="sh"><span id="sheetTitle"></span><button class="btn-ghost" onclick="closeSheet()">✕</button></div>
 <div class="sc" id="sheetBody"></div>
</div>

<div id="keypad" class="keypad hide">
 <div class="kgrid">
  <button onclick="kpPress('1')">1</button><button onclick="kpPress('2')">2</button><button onclick="kpPress('3')">3</button>
  <button onclick="kpPress('4')">4</button><button onclick="kpPress('5')">5</button><button onclick="kpPress('6')">6</button>
  <button onclick="kpPress('7')">7</button><button onclick="kpPress('8')">8</button><button onclick="kpPress('9')">9</button>
  <button onclick="kpPress('BS')">⌫</button><button onclick="kpPress('0')">0</button><button class="kok" onclick="kpClose()">✔</button>
 </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
// ================= 定義 =================
const PRESET = {
  A:{steps:["冷食","アイス"], qty:["アイス数","冷食数"], exclude:[]},
  C:{steps:["積み下ろし+検品","アイス","バラ","冷食","前出し","チェック+片付け","週次チェック(任意)"], qty:["アイス数","冷食数","オリコン数","バラ数"], exclude:["週次チェック(任意)"]},
  S:{steps:["積み下ろし","検品+陳列"], qty:["ケース(アイス+冷食)数"], exclude:[]},
};
const CHECKLIST = ["全店の書類があるか","ハンディのデータ入れ・所持","欠品報告はないか"];
const PHASE_LABEL = {title:"🕘 店舗作業タイマー", course:"コース変更", input:"②③ 数値入力", plan:"④⑤ 計画",
  loadAM:"⑰ 積み込み（朝積み）", loadPM:"⑰ 積み込み（夜積み）", order:"⑥ 回る順番", checklist:"⑦ 出発前チェック",
  stores:"⑧ 計測", returnTodo:"⑯ 帰社時Todo", handover:"⑱ 引継ぎ整理"};
const DAY_PHASES = ["input","plan","loadAM","order","checklist","stores","returnTodo","loadPM","handover","done"];

function defaultCourse(){
  return {name:"現コース", load:"night", stores:[
    {id:"A-K",type:"A"},{id:"C-T",type:"C"},{id:"S-T",type:"S"},{id:"S-F",type:"S"},{id:"C-A",type:"C"},{id:"C-N",type:"C"}]};
}
function typeName(t){return t==="A"?"A: 冷食/アイス":t==="C"?"C: フル":"S: 積下/検品+陳列";}

// ================= 状態 =================
let DB = loadDB();
let curDate = todayStr();       // 進行中の営業日（=今日）
let ui = {mode:"title", planTab:"__all__", inputStore:null, freeCtx:null, prevMode:null, listDate:todayStr(), orderDraft:null};
let ticker = null;

// ================= DB =================
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function nextDateStr(ds){const d=new Date(ds+"T00:00:00");d.setDate(d.getDate()+1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function freshDB(){ return {version:2, course:defaultCourse(), days:{}}; }
function loadDB(){
  let o=null; try{o=JSON.parse(localStorage.getItem("storeTimer"));}catch(e){}
  if(!o||!o.days) return freshDB();
  if(!o.version) o=migrateV1(o);
  if(!o.course) o.course=defaultCourse();
  return o;
}
function migrateV1(o){
  const nd={};
  for(const date of Object.keys(o.days||{})){
    const d=o.days[date], stores={};
    for(const id of Object.keys(d.stores||{})){
      const s=d.stores[id];
      stores[id]={type:s.type, qty:s.qty||{}, steps:(s.steps||[]).map(x=>({name:x.name,sec:x.sec||0,done:!!x.done})),
        learn:"",question:"",handover:"", todos:[], cur:s.cur||0, running:false, startAt:null};
    }
    nd[date]={phase:"done", eos:d.eos??null, order:Object.keys(stores), storeIdx:0, checklist:[true,true,true],
      stores, global:{handover:"",todos:[],returnTodos:[]}, loading:null, handoverDone:true};
  }
  return {version:2, course:defaultCourse(), days:nd};
}
function saveDB(){localStorage.setItem("storeTimer",JSON.stringify(DB));}
function dayOf(date){
  if(!DB.days[date]) DB.days[date]={phase:"title", eos:null, order:null, storeIdx:0, checklist:[false,false,false],
    stores:{}, global:{handover:"",todos:[],returnTodos:[]}, loading:null, handoverDone:false};
  const d=DB.days[date];
  if(!d.global) d.global={handover:"",todos:[],returnTodos:[]};
  if(!d.global.todos) d.global.todos=[];
  if(!d.global.returnTodos) d.global.returnTodos=[];
  if(d.storeIdx==null) d.storeIdx=0;
  if(!d.checklist) d.checklist=[false,false,false];
  return d;
}
function courseType(id){ const c=DB.course.stores.find(s=>s.id===id); return c?c.type:"C"; }
function storeOf(date,id){
  const d=dayOf(date);
  if(!d.stores[id]){
    const t=courseType(id);
    d.stores[id]={type:t, qty:{}, steps:PRESET[t].steps.map(n=>({name:n,sec:0,done:false})),
      learn:"",question:"",handover:"", todos:[], cur:0, running:false, startAt:null};
  }
  const s=d.stores[id];
  ["learn","question","handover"].forEach(k=>{if(s[k]==null)s[k]="";});
  if(!s.todos)s.todos=[];
  return s;
}
function loadingOf(date){
  const d=dayOf(date);
  if(!d.loading) d.loading={sec:0,running:false,startAt:null,done:false,eosNext:null,learn:"",question:"",handover:""};
  return d.loading;
}
function prevRecordedDate(ds){
  return Object.keys(DB.days).filter(k=>k<ds).sort().reverse()
    .find(k=>{const d=DB.days[k]; return d && (Object.keys(d.stores||{}).length>0 || d.loading || (d.global&&d.global.handover));});
}

// ================= 時間計算 =================
function elapsed(s){ return (s.running && s.startAt) ? Math.round((Date.now()-s.startAt)/1000) : 0; }
function liveSec(s,i){ const st=s.steps[i]; if(!st)return 0; return st.sec + ((s.running&&s.cur===i)?elapsed(s):0); }
function secOfName(s,name){ const i=s.steps.findIndex(x=>x.name===name); return i<0?0:liveSec(s,i); }
function isExcluded(s,st){ return !!st.extra || PRESET[s.type].exclude.includes(st.name); }
function totalSec(s){ let v=0; s.steps.forEach((st,i)=>{ if(!isExcluded(s,st)) v+=liveSec(s,i); }); return v; }
function loadingSec(l){ return l.sec + ((l.running&&l.startAt)?Math.round((Date.now()-l.startAt)/1000):0); }
function fmtClock(sec){ sec=Math.round(sec); const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"); }
function fmtMS(sec){ if(sec==null||!isFinite(sec))return "—"; sec=Math.round(sec); return Math.floor(sec/60)+":"+String(sec%60).padStart(2,"0"); }
function fmtTimer(sec){ sec=Math.round(sec); const m=Math.floor(sec/60), s=sec%60; return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0"); }
function digitsToSec(v){ v=String(v||"").replace(/\D/g,""); if(!v)return 0; if(v.length<=2)return parseInt(v)||0; return (parseInt(v.slice(0,-2))||0)*60+(parseInt(v.slice(-2))||0); }

// ================= per-unit =================
function perUnit(s){
  const q=s.qty, out=[]; const t=s.type;
  const num = k => { const v=parseFloat(q[k]); return isFinite(v)&&v>0 ? v : 0; };
  if(t==="A"||t==="C"){
    const it=secOfName(s,"アイス"), ft=secOfName(s,"冷食");
    const iq=num("アイス数"), fq=num("冷食数");
    if(iq+fq>0) out.push(["ケースあたり", fmtMS((it+ft)/(iq+fq))]);
    if(iq>0) out.push(["アイスあたり", fmtMS(it/iq)]);
    if(fq>0) out.push(["冷食あたり", fmtMS(ft/fq)]);
  }
  if(t==="C"){
    const bt = secOfName(s,"バラ");
    if(num("バラ数")>0) out.push(["バラあたり", fmtMS(bt/num("バラ数"))]);
    if(num("オリコン数")>0) out.push(["オリコンあたり", fmtMS(bt/num("オリコン数"))]);
  }
  if(t==="S"){
    if(num("ケース(アイス+冷食)数")>0) out.push(["ケースあたり", fmtMS(totalSec(s)/num("ケース(アイス+冷食)数"))]);
  }
  return out;
}
function caseCount(s){
  const q=s.qty; const num=k=>{const v=parseFloat(q[k]);return isFinite(v)?v:0;};
  if(s.type==="S") return num("ケース(アイス+冷食)数");
  return num("アイス数")+num("冷食数");
}

// ================= キーパッド =================
const KP={inp:null,onchange:null};
function kpFocus(inp,onchange){
  if(KP.inp) KP.inp.classList.remove("kpfocus");
  KP.inp=inp; KP.onchange=onchange||null;
  inp.classList.add("kpfocus");
  document.getElementById("keypad").classList.remove("hide");
  document.body.classList.add("kp-open");
  inp.scrollIntoView({block:"center"});
}
function kpPress(k){
  if(!KP.inp) return;
  let v=String(KP.inp.value||"");
  if(k==="BS") v=v.slice(0,-1); else if(v.length<5) v+=k;
  KP.inp.value=v;
  if(KP.onchange) KP.onchange(v);
}
function kpClose(){
  if(KP.inp) KP.inp.classList.remove("kpfocus");
  KP.inp=null; KP.onchange=null;
  document.getElementById("keypad").classList.add("hide");
  document.body.classList.remove("kp-open");
}
function mkKpField(value,onchange,width){
  const inp=document.createElement("input");
  inp.className="kpfield"; inp.readOnly=true; inp.value=value??""; inp.placeholder="—";
  if(width) inp.style.width=width;
  inp.onclick=()=>kpFocus(inp,onchange);
  return inp;
}

// ================= シート（ドロワー） =================
function openSheet(title,build){
  document.getElementById("sheetTitle").textContent=title;
  const b=document.getElementById("sheetBody"); b.innerHTML="";
  build(b);
  document.getElementById("sheetBg").classList.remove("hide");
  document.getElementById("sheetEl").classList.remove("hide");
}
function closeSheet(){
  document.getElementById("sheetBg").classList.add("hide");
  document.getElementById("sheetEl").classList.add("hide");
  kpClose();
  render(); // バッジ等の更新
}
function memoSheet(title,obj,key){
  openSheet(title,b=>{
    const ta=document.createElement("textarea"); ta.rows=5; ta.value=obj[key]||"";
    ta.placeholder="ここに書く"; ta.oninput=()=>{obj[key]=ta.value; saveDB();};
    b.appendChild(ta);
  });
}

// ================= Todo エディタ =================
function todoEditor(box,arr){
  const list=document.createElement("div");
  const redraw=()=>{
    list.innerHTML="";
    arr.forEach((t,i)=>{
      const r=document.createElement("div"); r.className="todo-row";
      const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!t.done;
      cb.onchange=()=>{t.done=cb.checked; saveDB(); redraw();};
      const sp=document.createElement("span"); sp.textContent=t.text; if(t.done)sp.className="done-txt";
      const del=document.createElement("button"); del.className="del"; del.textContent="−";
      del.onclick=()=>{arr.splice(i,1); saveDB(); redraw();};
      r.appendChild(cb); r.appendChild(sp); r.appendChild(del); list.appendChild(r);
    });
    if(arr.length===0){ list.innerHTML='<div class="mut" style="padding:6px 0">（なし）</div>'; }
  };
  redraw();
  const addRow=document.createElement("div"); addRow.className="row"; addRow.style.marginTop="8px";
  const inp=document.createElement("input"); inp.className="wide"; inp.placeholder="Todo を追加"; inp.style.flex="1";
  const btn=document.createElement("button"); btn.className="btn-accent"; btn.textContent="＋";
  const add=()=>{ const v=inp.value.trim(); if(!v)return; arr.push({text:v,done:false}); inp.value=""; saveDB(); redraw(); };
  btn.onclick=add; inp.onkeydown=e=>{if(e.key==="Enter")add();};
  addRow.appendChild(inp); addRow.appendChild(btn);
  box.appendChild(list); box.appendChild(addRow);
}

// ================= ルーター =================
function go(phase){
  if(DAY_PHASES.includes(phase)){ const d=dayOf(curDate); d.phase=phase; saveDB(); }
  ui.mode=phase;
  render();
}
function render(){
  const map={title:"scrTitle",course:"scrCourse",input:"scrInput",plan:"scrPlan",loadAM:"scrLoad",loadPM:"scrLoad",
    order:"scrOrder",checklist:"scrCheck",stores:"scrStore",returnTodo:"scrReturn",handover:"scrHandover"};
  document.querySelectorAll(".screen").forEach(el=>el.classList.add("hide"));
  const id=map[ui.mode]||"scrTitle";
  document.getElementById(id).classList.remove("hide");
  document.getElementById("hdrTitle").textContent=PHASE_LABEL[ui.mode]||PHASE_LABEL.title;
  document.getElementById("btnHome").classList.toggle("hide", ui.mode==="title");
  const r={title:renderTitle,course:renderCourse,input:renderInput,plan:renderPlan,loadAM:()=>renderLoad("AM"),
    loadPM:()=>renderLoad("PM"),order:renderOrder,checklist:renderCheck,stores:renderStore,
    returnTodo:renderReturn,handover:renderHandover}[ui.mode];
  if(r) r();
}
function confirmHome(){
  if(ui.mode==="title") return;
  if(confirm("タイトルへ戻る？（進行状態は保存済み・続きから再開できる）")){ ui.freeCtx=null; ui.mode="title"; render(); }
}

// ================= ① タイトル =================
function renderTitle(){
  const el=document.getElementById("scrTitle");
  const d=DB.days[curDate];

// 数量フォーム（②用。withOricon=true で⑧のオリコン後入力にも使う）
function buildQtyForm(box, date, id, withOricon){
  const s=storeOf(date,id);
  box.innerHTML="";
  const mkRow=(label,inp)=>{const r=document.createElement("div");r.className="qrow";
    const sp=document.createElement("span");sp.innerHTML=label;r.appendChild(sp);r.appendChild(inp);box.appendChild(r);return r;};
  if(s.type==="C" && !withOricon){
    let frozenInp;
    const recompute=()=>{
      const ice=parseFloat(s.qty["アイス数"]), cs=parseFloat(s.qty["_caseInput"]);
      if(isFinite(ice)&&isFinite(cs)){ s.qty["冷食数"]=String(Math.max(cs-ice,0)); frozenInp.value=s.qty["冷食数"]; saveDB(); }
    };
    mkRow("アイス数", mkKpField(s.qty["アイス数"]??"",v=>{s.qty["アイス数"]=v; saveDB(); recompute();}));
    mkRow("合計ケース数 <span class='mut'>(アイス+冷食)</span>", mkKpField(s.qty["_caseInput"]??"",v=>{s.qty["_caseInput"]=v; saveDB(); recompute();}));
    frozenInp=mkKpField(s.qty["冷食数"]??"",v=>{s.qty["冷食数"]=v; saveDB();});
    mkRow("冷食数 <span class='mut'>(自動=ケース−アイス・手修正可)</span>", frozenInp);
    mkRow("バラ数", mkKpField(s.qty["バラ数"]??"",v=>{s.qty["バラ数"]=v; saveDB();}));
  } else if(s.type==="C" && withOricon){
    mkRow("オリコン数 <span class='mut'>(後入力)</span>", mkKpField(s.qty["オリコン数"]??"",v=>{s.qty["オリコン数"]=v; saveDB(); renderPUInto(document.getElementById("puList"), s);}));
  } else {
    PRESET[s.type].qty.forEach(k=>{
      mkRow(k, mkKpField(s.qty[k]??"",v=>{s.qty[k]=v; saveDB();}));
    });
  }
}

  const b1=document.createElement("button"); b1.className=(l.running?"btn-warn":"btn-ok")+" big";
  b1.textContent=l.running?"⏸ 一時停止":(l.sec>0?"▶ 再開":"▶ 開始");
  b1.onclick=()=>{ if(l.running){l.sec+=Math.round((Date.now()-l.startAt)/1000);l.running=false;l.startAt=null;}
    else {l.running=true;l.startAt=Date.now();} saveDB(); renderLoad(mode); };
  const b2=document.createElement("button"); b2.className="btn-ghost big"; b2.textContent="完了 ✔";
  b2.onclick=()=>{ if(l.running){l.sec+=Math.round((Date.now()-l.startAt)/1000);l.running=false;l.startAt=null;} l.done=true; saveDB(); renderLoad(mode); };
  gr.appendChild(b1); gr.appendChild(b2); card.appendChild(gr);

  const ecard=document.createElement("div"); ecard.className="card";

    const r=document.createElement("div"); r.className="qrow";
    r.innerHTML='<span><b>翌日のEOS</b><div class="mut">翌日の②へ自動転記される</div></span>';

    ecard.innerHTML='<div class="row sb"><span class="mut">当日EOS（②で入力済み）</span><b>'+(d.eos??"—")+'</b></div>';

  [["📚 学び","learn"],["💭 疑問","question"],["📝 引継ぎ","handover"]].forEach(([lab,key])=>{
    const b=document.createElement("button"); b.className="btn-ghost"; b.style.flex="1"; b.style.fontSize="13px";

  const nx=document.createElement("button"); nx.className="btn-ok big";
  nx.textContent = mode==="AM" ? "⑥ 順番確認へ →" : "⑱ 引継ぎ整理へ →";

function renderLoadStats(mode,l){

    ((eos&&sec>0)?'<div class="pu"><span>EOSあたり</span><span class="v">'+fmtMS(sec/eos)+'</span></div>':'');
}

function renderOrder(){
  const el=document.getElementById("scrOrder");
  const d=dayOf(curDate);
  if(!ui.orderDraft){
    const base = d.order && d.order.length ? d.order.concat(DB.course.stores.map(s=>s.id).filter(id=>!d.order.includes(id)))
               : DB.course.stores.map(s=>s.id);
    const skipped = d.order ? DB.course.stores.map(s=>s.id).filter(id=>!d.order.includes(id)) : [];
    ui.orderDraft = base.map(id=>({id, go:!skipped.includes(id)}));
  }
  el.innerHTML='<div class="mut">今日回る順番に変更ある？ なければそのまま進んでOK。行かない店は「休」に。</div>';

    const r=document.createElement("div"); r.className="ord"+(o.go?"":" skip");
    r.innerHTML='<div class="nm">'+(i+1)+'. '+o.id+'店</div>';
    const up=document.createElement("button"); up.className="btn-ghost"; up.textContent="↑"; up.disabled=(i===0);
    up.onclick=()=>{[ui.orderDraft[i-1],ui.orderDraft[i]]=[ui.orderDraft[i],ui.orderDraft[i-1]]; renderOrder();};
    const dn=document.createElement("button"); dn.className="btn-ghost"; dn.textContent="↓"; dn.disabled=(i===ui.orderDraft.length-1);
    dn.onclick=()=>{[ui.orderDraft[i+1],ui.orderDraft[i]]=[ui.orderDraft[i],ui.orderDraft[i+1]]; renderOrder();};
    const sk=document.createElement("button"); sk.className=o.go?"btn-ghost":"btn-warn"; sk.textContent=o.go?"休":"行く";
    sk.onclick=()=>{o.go=!o.go; renderOrder();};
    r.appendChild(up); r.appendChild(dn); r.appendChild(sk);

  });

function activeCtx(){
  if(ui.freeCtx) return ui.freeCtx;
  const d=dayOf(curDate);
  const id=(d.order||[])[d.storeIdx];
  return id?{date:curDate,id,free:false}:null;
}
function renderStore(){
  const el=document.getElementById("scrStore");
  const ctx=activeCtx();
  if(!ctx){ el.innerHTML='<div class="card">今日の店がない。⑥へ戻る。</div>'; return; }
  const d=dayOf(ctx.date);
  const s=storeOf(ctx.date,ctx.id);
  el.innerHTML="";

  // ヘッダ行
  const top=document.createElement("div"); top.className="row sb";
  const prog = ctx.free ? '<span class="badge">'+ctx.date+'</span>'
    : '<span class="badge">'+(d.storeIdx+1)+' / '+d.order.length+'店</span>';
  top.innerHTML='<h1 style="margin:0">'+ctx.id+'店 <span class="mut" style="font-size:12px">'+typeName(s.type)+'</span></h1>'+prog;
  el.appendChild(top);

  // タイマー
  const tcard=document.createElement("div"); tcard.className="card";
  tcard.innerHTML='<div class="timer" id="timerDisp">'+fmtTimer(s.steps[s.cur]?liveSec(s,s.cur):0)+'</div>'+
    '<div class="mut" style="text-align:center" id="curStepName">'+(s.steps[s.cur]?(s.steps[s.cur].name+(s.running?" ⏱":"")):"完了")+'</div>';
  const gr=document.createElement("div"); gr.className="grid2"; gr.style.marginTop="12px";
  const bn=document.createElement("button"); bn.className="btn-ok big";
  bn.textContent = s.running ? "次へ ▶" : (s.steps.some(x=>x.sec>0||x.done)?"▶ 再開":"▶ 開始");
  bn.onclick=()=>nextStart(ctx);
  const bp=document.createElement("button"); bp.className="btn-warn big"; bp.textContent="⏸ 一時停止";
  if(!s.running) bp.classList.add("hide");
  bp.onclick=()=>pauseStore(ctx);
  gr.appendChild(bn); gr.appendChild(bp); tcard.appendChild(gr);
  el.appendChild(tcard);

  // ステップ一覧（タップで切り替え・✎で手修正）
  const scard=document.createElement("div"); scard.className="card";
  scard.innerHTML='<b>ステップ</b> <span class="mut">タップ=そのステップへ切替スタート/再開</span>';
  s.steps.forEach((st,i)=>{
    const div=document.createElement("div");
    div.className="step"+(i===s.cur?" cur":"")+(st.done?" done":"");
    const ex=isExcluded(s,st)?' <span class="mut">(合計外)</span>':'';
    div.innerHTML='<div class="nm">'+(st.done?"✓ ":"")+st.name+ex+'</div>'+
      '<div class="tm" id="tm'+i+'">'+fmtClock(liveSec(s,i)).replace(/^0:/,"")+'</div>';
    const eb=document.createElement("button"); eb.className="edit"; eb.textContent="✎";
    eb.onclick=(e)=>{e.stopPropagation(); editStepSheet(ctx,i);};
    div.appendChild(eb);
    div.onclick=()=>switchStep(ctx,i);
    scard.appendChild(div);
  });
  const addB=document.createElement("button"); addB.className="btn-ghost wfull"; addB.style.marginTop="6px";
  addB.textContent="＋ その他ステップ追加（合計外・自由記入）";
  addB.onclick=()=>addExtraStep(ctx);
  scard.appendChild(addB);
  const tot=document.createElement("div"); tot.className="step"; tot.style.cssText="background:none;border-top:1px solid #30363d;border-radius:0;cursor:default";
  tot.innerHTML='<div class="nm"><b>合計</b><span class="mut">（合計外を除く）</span></div><div class="tm" id="stepTotal">'+fmtClock(totalSec(s))+'</div>';
  scard.appendChild(tot);
  el.appendChild(scard);

  // オリコン後入力（C店のみ）
  if(s.type==="C"){
    const ocard=document.createElement("div"); ocard.className="card";
    buildQtyForm(ocard, ctx.date, ctx.id, true);
    el.appendChild(ocard);
  }

  // per-unit
  const pcard=document.createElement("div"); pcard.className="card";
  pcard.innerHTML='<b>○○あたり（分:秒）</b><div id="puList" style="margin-top:6px"></div>';
  el.appendChild(pcard);
  renderPUInto(pcard.querySelector("#puList"), s);

  // リセット
  const rs=document.createElement("button"); rs.className="btn-ghost wfull";
  rs.style.cssText="color:var(--danger);border:1px solid var(--danger)";
  rs.textContent="🗑 この店をリセット";
  rs.onclick=()=>{ if(!confirm(ctx.id+"店 の計測・数量・メモを全部消す？"))return;
    delete dayOf(ctx.date).stores[ctx.id]; storeOf(ctx.date,ctx.id); saveDB(); renderStore(); toast(ctx.id+"店 をリセット"); };
  el.appendChild(rs);

  // ⑮ 次店舗へ / 一覧へ戻る
  const nx=document.createElement("button"); nx.className="btn-accent big"; nx.style.marginTop="10px";
  if(ctx.free){ nx.textContent="← 一覧へ戻る"; nx.onclick=()=>{ui.freeCtx=null; ui.mode=ui.prevMode||"title"; render(); openList();}; }
  else {
    const last = d.storeIdx>=d.order.length-1;
    nx.textContent = last ? "⑯ 帰社へ →" : "⑮ 次店舗へ → "+d.order[d.storeIdx+1]+"店";
    nx.onclick=()=>finishStore(ctx,last);
  }
  el.appendChild(nx);

  // ドロワーバー
  renderDrawerBar(ctx,s);
}
function renderDrawerBar(ctx,s){
  let bar=document.getElementById("drawerBar");
  if(!bar){ bar=document.createElement("div"); bar.id="drawerBar"; bar.className="drawerbar"; document.body.appendChild(bar); }
  bar.classList.remove("hide");
  bar.innerHTML="";
  const d=dayOf(ctx.date);
  const items=[
    ["📚","学び",()=>memoSheet("⑨ 学びメモ（"+ctx.id+"店）",s,"learn"),!!s.learn],
    ["💭","疑問",()=>memoSheet("⑩ 疑問メモ（"+ctx.id+"店）",s,"question"),!!s.question],
    ["📝","店引継",()=>memoSheet("⑪ 引継ぎ（"+ctx.id+"店）",s,"handover"),!!s.handover],
    ["🌐","全体引継",()=>globalHandoverSheet(ctx),!!d.global.handover],
    ["✅","店Todo",()=>openSheet("⑬ Todo（"+ctx.id+"店）",b=>todoEditor(b,s.todos)),s.todos.some(t=>!t.done)],
  ];
  items.forEach(([ico,lab,fn,has])=>{
    const b=document.createElement("button");
    b.innerHTML=ico+"<br>"+lab+(has?'<span class="dot"></span>':"");
    b.onclick=fn; bar.appendChild(b);
  });
}
function hideDrawerBar(){ const bar=document.getElementById("drawerBar"); if(bar)bar.classList.add("hide"); }
function globalHandoverSheet(ctx){
  const d=dayOf(ctx.date);
  openSheet("⑫ 全体引継ぎ",b=>{
    const ta=document.createElement("textarea"); ta.rows=5; ta.value=d.global.handover||"";
    ta.oninput=()=>{d.global.handover=ta.value; saveDB();};
    b.appendChild(ta);
    const cp=document.createElement("button"); cp.className="btn-ghost wfull"; cp.style.marginTop="8px";
    cp.textContent="⑯ 帰社Todoへコピー";
    cp.onclick=()=>{ const v=(d.global.handover||"").trim(); if(!v){toast("空です");return;}
      d.global.returnTodos.push({text:v,done:false}); saveDB(); toast("帰社Todoに追加した"); };
    b.appendChild(cp);
  });
}
function nextStart(ctx){
  const s=storeOf(ctx.date,ctx.id);
  if(!s.running){
    if(!s.steps[s.cur]) s.cur=0;
    s.running=true; s.startAt=Date.now();
  } else {
    const st=s.steps[s.cur]; st.sec+=elapsed(s); st.done=true;
    const nxt=s.steps.findIndex(x=>!x.done);
    if(nxt>=0){ s.cur=nxt; s.startAt=Date.now(); }
    else { s.running=false; s.startAt=null; toast("店 完了 🎉"); }
  }
  saveDB(); renderStore();
}
function pauseStore(ctx){
  const s=storeOf(ctx.date,ctx.id);
  if(s.running){ const st=s.steps[s.cur]; if(st) st.sec+=elapsed(s); s.running=false; s.startAt=null; }
  saveDB(); renderStore();
}
function switchStep(ctx,i){
  const s=storeOf(ctx.date,ctx.id);
  if(i===s.cur){
    if(!s.running){ s.running=true; s.startAt=Date.now(); }
  } else {
    if(s.running){ s.steps[s.cur].sec+=elapsed(s); }
    s.cur=i; s.steps[i].done=false;
    s.running=true; s.startAt=Date.now();
  }
  saveDB(); renderStore();
}
function editStepSheet(ctx,i){
  const s=storeOf(ctx.date,ctx.id); const st=s.steps[i];
  openSheet("✎ "+st.name+" の時間手修正",b=>{
    const info=document.createElement("div"); info.className="mut";
    info.textContent="数字だけで入力（1000=10分00秒 / 130=1分30秒 / 45=45秒）。現在 "+fmtMS(st.sec);
    b.appendChild(info);
    const prev=document.createElement("div"); prev.className="timer"; prev.style.fontSize="34px"; prev.textContent=fmtMS(st.sec);
    const inp=mkKpField("",v=>{ prev.textContent=fmtMS(digitsToSec(v)); });
    inp.style.cssText="width:100%;font-size:22px;margin-top:8px";
    b.appendChild(inp); b.appendChild(prev);
    const sv=document.createElement("button"); sv.className="btn-ok wfull"; sv.textContent="保存";
    sv.onclick=()=>{
      if(inp.value!==""){ st.sec=digitsToSec(inp.value); if(s.running&&s.cur===i)s.startAt=Date.now(); saveDB(); }
      closeSheet();
    };
    b.appendChild(sv);
    kpFocus(inp,v=>{ prev.textContent=fmtMS(digitsToSec(v)); });
  });
}
function addExtraStep(ctx){
  const s=storeOf(ctx.date,ctx.id);
  openSheet("＋ その他ステップ追加",b=>{
    const inp=document.createElement("input"); inp.className="wide"; inp.placeholder="作業名（自由記入）";
    b.appendChild(inp);
    const ok=document.createElement("button"); ok.className="btn-ok wfull"; ok.style.marginTop="10px"; ok.textContent="追加";
    ok.onclick=()=>{ const v=inp.value.trim(); if(!v){toast("名前を入れて");return;}
      s.steps.push({name:v,sec:0,done:false,extra:true}); saveDB(); closeSheet(); };
    b.appendChild(ok);
    setTimeout(()=>inp.focus(),50);
  });
}
function finishStore(ctx,last){
  const s=storeOf(ctx.date,ctx.id);
  const undone=s.steps.filter(x=>!x.done&&!isExcluded(s,x)).length;
  if(undone>0 && !confirm("未完了ステップが "+undone+" 個ある。進む？")) return;
  if(s.running){ const st=s.steps[s.cur]; if(st){st.sec+=elapsed(s); st.done=true;} s.running=false; s.startAt=null; }
  const d=dayOf(ctx.date);
  if(last){ saveDB(); go("returnTodo"); }
  else { d.storeIdx++; saveDB(); renderStore(); toast("→ "+d.order[d.storeIdx]+"店"); }
}
function renderPUInto(box,s){
  if(!box)return;
  box.innerHTML="";
  const pu=perUnit(s);
  if(pu.length===0){ box.innerHTML='<div class="mut">数量を入れると ○○あたり が出る</div>'; }
  pu.forEach(([k,v])=>{ const el=document.createElement("div"); el.className="pu"; el.innerHTML='<span>'+k+'</span><span class="v">'+v+'</span>'; box.appendChild(el); });
}

// ================= ⑯ 帰社時Todo =================
function renderReturn(){
  const el=document.getElementById("scrReturn");
  const d=dayOf(curDate);
  el.innerHTML="";
  const card=document.createElement("div"); card.className="card";
  card.innerHTML='<b>⑯ 帰社時Todo（全体）</b><div class="mut">⑫全体引継ぎからコピーした分もここに入る</div>';
  todoEditor(card,d.global.returnTodos);
  el.appendChild(card);
  const nx=document.createElement("button"); nx.className="btn-ok big";
  nx.textContent = DB.course.load==="night" ? "⑰ 積み込み（夜積み）へ →" : "⑱ 引継ぎ整理へ →";
  nx.onclick=()=>go(DB.course.load==="night"?"loadPM":"handover");
  el.appendChild(nx);
}

// ================= ⑱ 引継ぎ整理 =================
function renderHandover(){
  const el=document.getElementById("scrHandover");
  const d=dayOf(curDate);
  el.innerHTML='<div class="mut">今日出た引継ぎを整理（編集/削除）。ここで残した内容が翌日の④に出る。</div>';
  const mkSec=(title,obj,key)=>{
    const c=document.createElement("div"); c.className="card";
    c.innerHTML='<b>'+title+'</b>';
    const ta=document.createElement("textarea"); ta.rows=2; ta.value=obj[key]||""; ta.placeholder="（なし）";
    ta.oninput=()=>{obj[key]=ta.value; saveDB();};
    c.appendChild(ta); el.appendChild(c);
  };
  DB.course.stores.forEach(cs=>{
    const s=d.stores[cs.id];
    if(s) mkSec("⑪ "+cs.id+"店", s, "handover");
  });
  mkSec("⑫ 全体", d.global, "handover");
  if(d.loading) mkSec("⑰ 積み込み", d.loading, "handover");
  const nx=document.createElement("button"); nx.className="btn-ok big";
  nx.textContent="✔ 今日を終える";
  nx.onclick=()=>{ d.handoverDone=true; d.phase="done"; saveDB(); ui.mode="title"; render(); toast("おつかれさま 🎉"); };
  el.appendChild(nx);
}

// ================= ⑭ 一覧モード =================
function openList(){
  ui.listDate=ui.listDate||todayStr();
  document.getElementById("listOv").classList.remove("hide");
  renderList();
}
function closeList(){ document.getElementById("listOv").classList.add("hide"); }
function renderList(){
  const el=document.getElementById("listInner");
  const date=ui.listDate;
  const d=dayOf(date);
  el.innerHTML="";
  const card=document.createElement("div"); card.className="card";
  const r1=document.createElement("div"); r1.className="row sb";
  r1.innerHTML='<span class="mut">日付</span>';
  const di=document.createElement("input"); di.type="date"; di.className="date"; di.value=date;
  di.onchange=()=>{ui.listDate=di.value||todayStr(); renderList();};
  r1.appendChild(di); card.appendChild(r1);
  const r2=document.createElement("div"); r2.className="row sb"; r2.style.marginTop="8px";
  r2.innerHTML='<span class="mut">EOS</span><b>'+(d.eos??"—")+'</b>';
  card.appendChild(r2);
  if(d.loading&&(d.loading.sec>0||d.loading.running)){
    const r3=document.createElement("div"); r3.className="row sb"; r3.style.marginTop="8px";
    r3.innerHTML='<span class="mut">積み込み</span><b>'+fmtClock(loadingSec(d.loading))+'</b>';
    card.appendChild(r3);
  }
  el.appendChild(card);

  const ids = DB.course.stores.map(s=>s.id).concat(Object.keys(d.stores).filter(id=>!DB.course.stores.some(s=>s.id===id)));
  ids.forEach(id=>{
    const s=d.stores[id];
    let badge='<span class="badge">未計測</span>', sub=typeName(courseType(id));
    if(s){
      const anyTime=s.steps.some(x=>x.sec>0);
      const allDone=s.steps.filter(x=>!isExcluded(s,x)).every(x=>x.done);
      if(allDone&&anyTime) badge='<span class="badge done">完了 '+fmtClock(totalSec(s))+'</span>';
      else if(anyTime||s.running) badge='<span class="badge active">計測中 '+fmtClock(totalSec(s))+'</span>';
      const bits=[];
      const cc=caseCount(s); if(cc)bits.push("ケース"+cc);
      const br=parseFloat(s.qty["バラ数"]); if(isFinite(br)&&br>0)bits.push("バラ"+br);
      if(s.handover)bits.push("📝"); if(s.learn)bits.push("📚"); if(s.question)bits.push("💭");
      if(s.todos&&s.todos.some(t=>!t.done))bits.push("✅");
      if(bits.length)sub=bits.join(" ／ ");
    }
    const div=document.createElement("div"); div.className="store-item";
    div.innerHTML='<div><div class="nm">'+id+'店</div><div class="mut">'+sub+'</div></div>'+badge;
    div.onclick=()=>{ ui.prevMode=ui.mode; ui.freeCtx={date,id,free:true}; closeList(); ui.mode="stores"; render(); };
    el.appendChild(div);
  });
  const rd=document.createElement("button"); rd.className="btn-ghost wfull"; rd.style.cssText="margin-top:10px;color:var(--danger)";
  rd.textContent="この日をリセット";
  rd.onclick=()=>{ if(confirm(date+" のデータを消す？")){ delete DB.days[date]; saveDB(); renderList(); } };
  el.appendChild(rd);
}

// ================= 入出力 =================
function exportJSON(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="store-timer-backup.json"; document.body.appendChild(a); a.click(); a.remove();
  toast("エクスポートした");
}
function importJSON(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ let o=JSON.parse(r.result);
      if(o&&o.days){ if(!o.version)o=migrateV1(o); if(!o.course)o.course=defaultCourse(); DB=o; saveDB(); render(); toast("インポートした"); }
      else toast("形式が違う"); }catch(err){ toast("読み込み失敗"); } };
  r.readAsText(f); e.target.value="";
}

// ================= toast / ticker =================
let toastT=null;
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1700); }
function tick(){
  if(ui.mode==="stores"){
    const ctx=activeCtx(); if(!ctx)return;
    const s=storeOf(ctx.date,ctx.id);
    const st=s.steps[s.cur];
    const td=document.getElementById("timerDisp"); if(td) td.textContent=fmtTimer(st?liveSec(s,s.cur):0);
    const cn=document.getElementById("curStepName"); if(cn) cn.textContent=st?(st.name+(s.running?" ⏱":"")):"完了";
    const tm=document.getElementById("tm"+s.cur); if(tm&&st) tm.textContent=fmtClock(liveSec(s,s.cur)).replace(/^0:/,"");
    const tt=document.getElementById("stepTotal"); if(tt) tt.textContent=fmtClock(totalSec(s));
    if(s.running) renderPUInto(document.getElementById("puList"),s);
  } else if(ui.mode==="loadAM"||ui.mode==="loadPM"){
    const l=loadingOf(curDate);
    const lt=document.getElementById("loadTimer"); if(lt) lt.textContent=fmtTimer(loadingSec(l));
    if(l.running) renderLoadStats(ui.mode==="loadAM"?"AM":"PM",l);
  }
}

// ================= 描画フック（ドロワーバー表示制御） =================
const _origRender=render;
render=function(){
  _origRender();
  if(ui.mode!=="stores") hideDrawerBar();
};

// ================= init =================
(function init(){
  const d=DB.days[curDate];
  if(d && d.phase && d.phase!=="title" && d.phase!=="done") ui.mode=d.phase;
  else ui.mode="title";
  render();
  ticker=setInterval(tick,500);
  if('serviceWorker' in navigator){ window.addEventListener('load', ()=>navigator.serviceWorker.register('./sw.js').catch(()=>{})); }
})();
</script>
</body>
